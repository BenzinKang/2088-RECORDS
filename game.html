<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2088 // ARCHIVE SYSTEM</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    width:100%;
    height:100vh;

    background:#050a18;

    color:#00c8ff;

    font-family:
    "Courier New",
    monospace;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}



body::before{

    content:"";

    position:fixed;

    inset:0;

    background:

    linear-gradient(
        rgba(5,10,24,.75),
        rgba(5,10,24,.95)
    );

    z-index:-1;

}



.terminal{

    width:90%;

    max-width:850px;

    padding:40px;

    border:

    1px solid rgba(0,200,255,.35);


    background:

    rgba(5,10,24,.75);


    backdrop-filter:blur(15px);


    box-shadow:

    0 0 50px rgba(0,200,255,.15);

}




.logo{

    font-size:32px;

    letter-spacing:8px;

    margin-bottom:10px;

}



.subtitle{

    color:#6e5cff;

    margin-bottom:35px;

}



#screen{

    height:320px;

    overflow:hidden;

    line-height:1.8;

    font-size:15px;

}



.input{

    display:flex;

    gap:12px;

    border-top:

    1px solid rgba(0,200,255,.25);

    padding-top:20px;

}



input{

    flex:1;

    background:none;

    border:none;

    outline:none;

    color:#00c8ff;

    font-size:16px;

    font-family:inherit;

}



.success{

    color:#38e0ff;

    text-shadow:

    0 0 12px #00c8ff;

}



.warning{

    color:#6e5cff;

}



.glitch{

    animation:

    glitch .15s infinite;

}



@keyframes glitch{


0%{

transform:translate(2px);

}


50%{

transform:translate(-2px);

}


100%{

transform:translate(0);

}


}




@media(max-width:600px){


.terminal{

    padding:25px;

}


.logo{

    font-size:22px;

}


#screen{

    height:280px;

    font-size:14px;

}


}


</style>

</head>


<body>



<div class="terminal">


<div class="logo">
2088 // ARCHIVE
</div>


<div class="subtitle">
NEURAL ACCESS TERMINAL
</div>



<div id="screen">

<p>> INITIALIZING SYSTEM...</p>
<p>> CONNECTING TO 2088 NETWORK...</p>
<p>> ACCESS LEVEL: GUEST</p>
<p>> TYPE HELP FOR COMMANDS</p>

</div>




<div class="input">


<span>></span>


<input 
id="command"
autocomplete="off"
placeholder="ENTER COMMAND">


</div>



</div>






<script>


const screen =
document.getElementById("screen");


const input =
document.getElementById("command");



let level = 0;




function log(text,type=""){


const p =
document.createElement("p");


p.textContent =
"> " + text;



if(type)
p.className=type;



screen.appendChild(p);



screen.scrollTop =
screen.scrollHeight;


}





input.addEventListener(
"keydown",
(e)=>{


if(e.key !== "Enter")
return;



let cmd =
input.value
.trim()
.toLowerCase();



input.value="";



log(cmd);





/* =================
   GLOBAL
================= */


if(cmd==="home"){


log(
"RETURNING TO MAIN SYSTEM..."
);


setTimeout(()=>{


location.href="index.html";


},1000);


return;

}


    
if(cmd==="admin"){

log(
"ACCESSING ADMIN PANEL..."
);

setTimeout(()=>{

location.href="https://demo.2088.studio/admin.html";

},1000);

return;

}




if(cmd==="help"){


log(
"AVAILABLE COMMANDS:",
"warning"
);


log("scan");

log("2088");

log("1788");

log("status");

log("home");


return;

}




if(cmd==="status"){


log(
"CURRENT LEVEL: "
+
(level+1)
);


return;

}





/* =================
   LEVEL 1
================= */


if(level===0){


if(cmd==="scan"){


level=1;


log(
"SIGNAL FOUND",
"success"
);


log(
"UNKNOWN FREQUENCY DETECTED"
);


log(
"REQUIRED KEY: 2088"
);


}


else{


log(
"NO SIGNAL MATCH"
);


}


return;

}







/* =================
   LEVEL 2
================= */


if(level===1){


if(cmd==="2088"){


level=2;


log(
"FREQUENCY SYNCHRONIZED",
"success"
);


log(
"ARCHIVE CHANNEL OPEN"
);


log(
"REQUIRED KEY: 1788"
);



}


else{


log(
"INCORRECT FREQUENCY"
);


}


return;

}







/* =================
   LEVEL 3
================= */


if(level===2){


if(cmd==="1788"){


level=3;


log(
"ACCESS GRANTED",
"success"
);


log(
"ARCHIVE 1788-L UNLOCKED",
"success"
);


log(
"ORIGIN: UNKNOWN"
);


log(
"WELCOME TO THE FUTURE WORLD",
"success"
);



document.body.classList.add(
"glitch"
);



setTimeout(()=>{


document.body.classList.remove(
"glitch"
);


},2000);



}


else{


log(
"ARCHIVE ENCRYPTED"
);


}


return;

}






if(level===3){


log(
"SYSTEM ALREADY UNLOCKED"
);


}




});



</script>



</body>

</html>
